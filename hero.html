<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MUEGGE — creating waves</title>
<link rel="icon" href="muegge-favicon.jpg" sizes="any" />
<link rel="apple-touch-icon" href="muegge-favicon.jpg" />
<style>
  :root { --deep:#0a1d37; --ink:#0a1523; --cyan:#60C6F0; }
  * { box-sizing:border-box; margin:0; padding:0; }
  html { font-size:112.5%; }
  body { font-family:'Hellix','Inter',system-ui,-apple-system,sans-serif; background:var(--ink); color:#fff; overflow:hidden; }

  .hero { position:relative; height:100vh; min-height:560px; width:100%; }
  #wave { position:absolute; inset:0; width:100%; height:100%; display:block; }
  .hero__content { position:absolute; inset:0; display:flex; flex-direction:column; justify-content:center;
    padding:0 8vw; pointer-events:none; z-index:2; }

  .eyebrow { letter-spacing:.28em; text-transform:uppercase; font-size:.72rem; color:var(--cyan);
    margin-bottom:1.4rem; font-weight:700; }

  /* H1 — wie muegge-group.com. TODO: size / letter-spacing / line-height von muegge bestätigen/ersetzen. */
  h1 { font-weight:700; text-transform:uppercase; color:#fff;
    font-size:clamp(2.6rem, 6vw, 4.5rem); letter-spacing:.01em; line-height:1.05; }
  h1 em { font-style:normal; color:var(--cyan); }   /* Brand-Akzent "waves" — auf Wunsch entfernen */

  /* Intro (ehem. Subhead) — 500, weiß. TODO: size/line-height ggf. an muegge angleichen. */
  .intro { margin-top:1.6rem; max-width:42ch; color:#fff; font-weight:500;
    font-size:1.15rem; line-height:1.5; }
</style>
</head>
<body>
  <section class="hero">
    <canvas id="wave"></canvas>
    <div class="hero__content">
      <div class="eyebrow">MUEGGE · Microwave &amp; Plasma</div>
      <h1>creating <em>waves</em></h1>
      <p class="intro">Vom Stromnetz bis zum Plasmabrenner — die komplette Kette, sichtbar gemacht.</p>
    </div>
  </section>

  <script type="module">
    // Minimal-Variante: nur die Wave, kein Menü/Auswahl. Teilt sich wave.js mit der Vollversion (index.html).
    try {
      const { createWaveField } = await import('./wave.js');
      const field = createWaveField(document.getElementById('wave'), {});
      field.setMode('wave');
    } catch (e) { console.error('wave.js', e); }
  </script>
</body>
</html>
