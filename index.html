<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MUEGGE — creating waves · Showcase</title>
<link rel="icon" href="muegge-favicon.jpg" sizes="any" />
<link rel="apple-touch-icon" href="muegge-favicon.jpg" />
<style>
  :root {
    --deep:#0a1d37; --ink:#0a1523; --cyan:#60C6F0; --green:#61CE70; --peach:#FFBC7D;
    --text:#cdd6e4; --muted:#7c8aa0;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html { font-size:112.5%; }
  body { font-family:'Hellix','Inter',system-ui,-apple-system,sans-serif; background:var(--ink); color:var(--text); overflow-x:hidden; font-weight:500; }

  .hero { position:relative; height:100vh; min-height:560px; width:100%; }
  #wave, #particles { position:absolute; inset:0; width:100%; height:100%; display:block; }
  #particles { display:none; }
  .hero__content { position:absolute; inset:0; display:flex; flex-direction:column; justify-content:center; padding:0 8vw; pointer-events:none; z-index:2; }
  .eyebrow { letter-spacing:.28em; text-transform:uppercase; font-size:.72rem; color:var(--cyan); margin-bottom:1.2rem; font-weight:700; }
  h1 { font-size:clamp(2.4rem,7vw,4rem); line-height:1.05; font-weight:700; color:#fff; letter-spacing:.5px; }
  h1 em { font-style:normal; color:var(--cyan); }
  .sub { margin-top:1.4rem; max-width:34ch; color:var(--muted); font-size:1.05rem; line-height:1.5; }

  .panel { position:fixed; left:50%; bottom:1.4rem; transform:translateX(-50%); z-index:10;
    display:flex; flex-wrap:wrap; gap:.3rem; align-items:center; justify-content:center;
    padding:.55rem .6rem; border:1px solid rgba(96,198,240,.25); background:rgba(10,21,35,.78);
    backdrop-filter:blur(10px); border-radius:3px; width:94vw; max-width:1600px; }
  .panel button { font:inherit; font-size:.73rem; font-weight:500; letter-spacing:.02em; color:var(--text);
    background:transparent; border:1px solid transparent; padding:.4rem .6rem; cursor:pointer; border-radius:2px; transition:.2s ease; white-space:nowrap; }
  .panel button:hover { color:#fff; background:rgba(96,198,240,.12); }
  .panel button.active { color:var(--ink); background:var(--cyan); font-weight:700; }
  .panel .sep { width:1px; height:22px; background:rgba(255,255,255,.14); margin:0 .25rem; }
  .panel .scrub { display:none; align-items:center; gap:.5rem; padding:0 .35rem; }
  .panel .scrub.show { display:flex; }
  .panel input[type=range] { width:130px; accent-color:var(--cyan); }

  .caption { width:100%; text-align:center; font-size:.78rem; color:var(--muted); line-height:1.35; margin:0 0 .4rem; padding:0 .5rem; }
  /* Stations-Labels (nur Kette B) */
  .stations { width:100%; display:none; justify-content:center; gap:1.4rem; font-size:.7rem; letter-spacing:.06em; text-transform:uppercase; margin-bottom:.25rem; }
  .stations.show { display:flex; }
  .stations span { color:var(--muted); transition:.25s ease; opacity:.5; }
  .stations span.on { color:var(--cyan); opacity:1; text-shadow:0 0 12px rgba(96,198,240,.6); }
  .hint { position:fixed; top:1.2rem; right:1.4rem; z-index:9; font-size:.7rem; color:var(--muted); letter-spacing:.05em; }
  @media (max-width:620px){ .hint, .sub, .stations { display:none; } }
</style>
</head>
<body>
  <section class="hero">
    <canvas id="wave"></canvas>
    <canvas id="particles"></canvas>
    <div class="hero__content">
      <div class="eyebrow">MUEGGE · Microwave & Plasma</div>
      <h1>creating <em>waves</em></h1>
      <p class="sub">Vom Stromnetz bis zum Plasmabrenner — die komplette Kette, sichtbar gemacht.</p>
    </div>
  </section>

  <p class="hint" id="hint"></p>

  <nav class="panel" id="panel">
    <div class="stations" id="stations">
      <span>Generator</span><span>Magnetron</span><span>Hohlleiter</span><span>Plasma</span><span>Kristall</span>
    </div>
    <div class="caption" id="caption"></div>
    <!-- Fläche / Punktefeld -->
    <button data-mode="wave">Wave</button>
    <button data-mode="grid">Grundfeld</button>
    <button data-mode="ring">Hotspot</button>
    <button data-mode="agdots">Ionen</button>
    <button data-mode="antigravity">Feldlinien</button>
    <button data-mode="magnet">Magnetron</button>
    <button data-mode="pulse">Signal</button>
    <button data-mode="shock">Impuls</button>
    <button data-mode="repelG">Auslenkung</button>
    <button data-mode="interfere">Interferenz</button>
    <button data-mode="beam">Beam</button>
    <button data-mode="resonance">Resonanz</button>
    <button data-mode="ironfilings">Feilspäne</button>
    <button data-mode="waferscan">Scan</button>
    <button data-mode="wafer">Wafer</button>
    <button data-mode="molecule">Molekül</button>
    <button data-mode="freeze">Erstarrung</button>
    <button data-mode="strudel">Strudel</button>
    <button data-mode="mistG">Nebel</button>
    <span class="sep"></span>
    <!-- Kugel -->
    <button data-mode="plasma">Plasma</button>
    <button data-mode="blob">Blob</button>
    <button data-mode="distort">Modulation</button>
    <button data-mode="ignite">Zündung</button>
    <button data-mode="globe">Netz</button>
    <span class="sep"></span>
    <!-- Kristall / Formation -->
    <button data-mode="gem">Diamant</button>
    <button data-mode="reaktor">Reaktor</button>
    <button data-mode="swarm">Formation</button>
    <span class="sep"></span>
    <!-- Partikel-Effekte (particles.js, mit Trails) -->
    <button data-mode="mist">Strömung</button>
    <button data-mode="repel">Linien</button>
    <button data-mode="bounce">Kinetik</button>
    <span class="sep"></span>
    <!-- Ketten -->
    <button data-mode="chain">▶ Kette</button>
    <button data-mode="chain2">▶ Signal-Kette</button>
    <span class="scrub" id="scrub"><input type="range" min="0" max="1" step="0.001" value="0" id="range" /></span>
  </nav>

  <div id="err" style="display:none;position:fixed;inset:0;z-index:99;background:rgba(0,0,0,.92);color:#ff8a8a;font:12px/1.5 monospace;padding:2rem;overflow:auto;white-space:pre-wrap;"></div>
  <script type="module">
    const showErr = (label, e) => { const b=document.getElementById('err'); b.style.display='block'; b.textContent += '\n=== '+label+' ===\n'+(e&&e.stack?e.stack:(e&&e.message)||e)+'\n'; };
    window.addEventListener('error', (ev) => showErr('window.error', ev.error || ev.message));
    window.addEventListener('unhandledrejection', (ev) => showErr('promise', ev.reason));

    let createWaveField, createParticleField;
    try { ({ createWaveField } = await import('./wave.js')); }
    catch (e) { showErr('import wave.js', e); throw e; }
    try { ({ createParticleField } = await import('./particles.js')); }
    catch (e) { showErr('import particles.js', e); throw e; }

    // Modi, die auf der stateful Partikel-Engine (particles.js) laufen
    const PARTICLE_MODES = new Set(['bounce', 'mist', 'repel']);
    // Alte stateless-Varianten (wave.js) unter eigenem Button-Key, gemappt auf die Konzept-Namen
    const STATELESS_ALIAS = { mistG: 'mist', repelG: 'repel' };

    const CAPTIONS = {
      wave:    'Mikrowelle — eine Sinus-Wellenfront läuft durchs Feld.',
      ring:    'Hotspot — eine wabernde Feldüberhöhung am Cursor.',
      agdots:  'Ionen — verstreute Teilchen im Feld, am Cursor ein wabernder Ring.',
      antigravity: 'Feldlinien — orientierte Striche im Flow-Feld, wirbeln am Cursor.',
      grid:    'Grundfeld — ruhig atmendes Punktefeld von oben (Prozess-Fläche).',
      magnet:  'Magnetron — der Cursor schiebt die Partikel auseinander.',
      pulse:   'Signal — ein Puls strahlt von der Quelle aus.',
      gem:     'Diamant — CVD-Wachstum: Atome wachsen Schicht für Schicht zum Kristall.',
      reaktor: 'Reaktor — ein strahlender Kristall-Kern.',
      plasma:  'Plasma — wabernde, leuchtende Plasma-Kugel; der Cursor verformt sie.',
      molecule:  'Molekül — Mikrowellen spalten Moleküle in Radikale (Power-to-X).',
      wafer:     'Wafer — Downstream-Plasma reinigt den Wafer atomgenau.',
      interfere: 'Interferenz — zwei Mikrowellen-Quellen, stehende Welle (Cursor = 2. Quelle).',
      beam:      'Beam — ein Antennen-Array lenkt einen Strahl; der Cursor steuert.',
      ignite:    'Zündung — kalte Gas-Wolke zündet, ionisiert, glüht, klingt ab.',
      globe:     'Netz — Lieferung in 40+ Länder; Klick sendet ein Signal.',
      swarm:     'Formation — die Partikel finden zur MUEGGE-Wortmarke.',
      blob:      'Blob — organisch morphende Dot-Kugel; der Cursor verformt sie.',
      distort:   'Modulation — Mausbewegung moduliert die Kugel (links↔rechts Stärke, oben↔unten Twist).',
      strudel:   'Strudel — die Plane formt sich nach unten zu einem Trichter; die Mitte wird verdreht und eingesogen (kein Loch).',
      mistG:     'Nebel — feine Curl-Flow-Strähnen auf dem ruhigen Punktefeld.',
      repelG:    'Auslenkung — Klick (oder automatisch nach kurzer Ruhe) lenkt die Partikel lokal aus; sie schwingen elastisch zurück.',
      mist:          'Strömung — dichte Partikel-Filamente folgen einem Flow-Feld und zeichnen fließende Spuren (mit Trails).',
      repel:         'Linien — Partikel folgen einem Flow-Feld und ziehen Spuren; der Cursor wirbelt sie kräftig um sich herum.',
      bounce:        'Kinetik — Partikel treiben langsam und prallen von den Wänden ab; der Cursor schubst sie an und beschleunigt sie.',
      resonance:     'Resonanz — eine schwingende Membran in ihren Eigenmoden (Antiknoten auf/ab); der Cursor stimmt die Frequenz (Mode n,m). Kurze Ruhe dazwischen.',
      freeze:        'Erstarrung — eine Front läuft durch und friert die heißen Partikel ins Gitter (Kristallisation).',
      shock:         'Impuls — Klick (oder automatisch nach kurzer Ruhe) erzeugt eine radiale Druckwelle; die Partikel schwingen zurück.',
      ironfilings:   'Feilspäne — die Dots richten sich entlang des Cursor-Dipolfelds aus (Magnetron-Feld).',
      waferscan:     'Scan — eine Scan-Linie legt das Die-Grid frei und markiert Defekte (Halbleiter-Inspektion).',
      chain:   'Kette — Mikrowellen-Leistung baut sich auf und wird abgestrahlt („creating waves“).',
      chain2:  'Signal-Kette — ein Signal läuft durch die Komplettkette (Generator → … → Kristall).',
    };

    // Interaktions-Hinweis je Modus (oben rechts) — nur was wirklich reagiert
    const HINTS = {
      wave:        'Maus bewegen · Klick = Puls',
      ring:        'Maus bewegen → der Hotspot folgt',
      agdots:      'Maus bewegen → Ionen reagieren',
      antigravity: 'Maus bewegen → Feldlinien wirbeln',
      grid:        'Maus bewegen · Klick = Puls',
      magnet:      'Maus bewegen → schiebt die Partikel',
      pulse:       'Klick = Signal senden',
      gem:         'läuft automatisch (Wachstum)',
      reaktor:     'läuft automatisch (Rotation)',
      plasma:      'Maus bewegen → verformt das Plasma',
      chain:       'Slider ziehen = Kette steuern',
      chain2:      'Slider ziehen = Signal steuern',
      molecule:    'Maus bewegen → spaltet Molekuele',
      wafer:       'Maus bewegen → reinigt den Wafer',
      interfere:   'Maus bewegen → zweite Wellenquelle',
      beam:        'Maus bewegen → lenkt den Strahl',
      ignite:      'läuft automatisch (Zündung)',
      globe:       'Klick = Signal über das Netz senden',
      swarm:       'läuft automatisch (Formation)',
      blob:        'Maus bewegen → verformt den Blob',
      distort:     'Maus bewegen verformt · rechts = Stärke · unten = Twist',
      strudel:     'läuft automatisch (Plane → Trichter)',
      mistG:       'läuft automatisch (Curl-Flow)',
      repelG:      'Klick = Auslenkung · sonst automatisch',
      mist:         'läuft automatisch (Flow-Filamente)',
      repel:        'Maus bewegen → wirbelt die Linien',
      bounce:       'Maus bewegen → schubst & beschleunigt',
      resonance:    'Maus bewegen → Frequenz/Mode stimmen',
      freeze:       'läuft automatisch (Erstarrungs-Front)',
      shock:        'Klick = Impuls · sonst automatisch',
      ironfilings:  'Maus bewegen → richtet das Feld aus',
      waferscan:    'läuft automatisch (Scan-Linie)',
    };

    const canvas = document.getElementById('wave');
    const pcanvas = document.getElementById('particles');
    const panel = document.getElementById('panel');
    const buttons = [...panel.querySelectorAll('button')];
    const caption = document.getElementById('caption');
    const scrub = document.getElementById('scrub');
    const range = document.getElementById('range');
    const stations = document.getElementById('stations');
    const stationEls = [...stations.querySelectorAll('span')];
    const hint = document.getElementById('hint');
    let dragging = false;

    let field;
    try {
      field = createWaveField(canvas, {
        density: 1.0,
        onChain: (pos) => {
          if (!dragging) range.value = pos;
          const active = Math.min(4, Math.floor(pos * 5));
          stationEls.forEach((el, i) => el.classList.toggle('on', i <= active)); // passierte Stationen bleiben an
        },
      });
    } catch (e) { showErr('createWaveField', e); throw e; }

    let pfield = null;  // particles.js wird lazy erstellt (erst beim ersten Partikel-Modus)

    function select(mode) {
      const isP = PARTICLE_MODES.has(mode);
      if (isP) {
        canvas.style.display = 'none';            // wave.js pausiert (IntersectionObserver)
        pcanvas.style.display = 'block';
        if (!pfield) { try { pfield = createParticleField(pcanvas, {}); } catch (e) { showErr('createParticleField', e); throw e; } }
        pfield.setMode(mode);
      } else {
        pcanvas.style.display = 'none';           // particles.js pausiert
        canvas.style.display = 'block';
        field.setMode(STATELESS_ALIAS[mode] || mode);
      }
      buttons.forEach((b) => b.classList.toggle('active', b.dataset.mode === mode));
      caption.textContent = CAPTIONS[mode] || '';
      hint.textContent = HINTS[mode] || '';
      const isChain = mode === 'chain' || mode === 'chain2';
      scrub.classList.toggle('show', isChain);
      stations.classList.toggle('show', isChain);
    }
    buttons.forEach((b) => b.addEventListener('click', () => select(b.dataset.mode)));
    range.addEventListener('pointerdown', () => { dragging = true; });
    window.addEventListener('pointerup', () => { dragging = false; });
    range.addEventListener('input', () => field.scrub(parseFloat(range.value)));

    select('wave');
  </script>
</body>
</html>
